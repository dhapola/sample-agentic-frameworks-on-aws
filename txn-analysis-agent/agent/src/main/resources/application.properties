# Amazon Bedrock Configuration
# Default Model ID - change this to use a different model
bedrock.model.id=global.anthropic.claude-haiku-4-5-20251001-v1:0

# AWS Region where Bedrock is available
bedrock.region=ap-south-1

# Agent working directory - log files read from here, CSV output written here.
# system_prompt.md is also read from this folder.
agent.workdir=./workdir
