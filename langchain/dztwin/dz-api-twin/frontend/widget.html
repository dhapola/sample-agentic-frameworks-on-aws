<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        connect-src 'self' http://localhost:3000 https:;
        font-src 'self' data:;
        frame-ancestors 'self' http://localhost:* http://127.0.0.1:*;
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>Chat Widget</title>
    <link rel="stylesheet" href="widget.css">
</head>
<body>
    <div id="chat-widget">
        <div id="chat-header">
            <div class="header-content">
                <h3 id="chat-title">API Twin</h3>
                <p id="chat-subtitle">We're here to help</p>
            </div>
            <div class="header-actions">
                <button id="expand-btn" aria-label="Expand chat" title="Expand">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
                <button id="close-btn" aria-label="Close chat" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div id="chat-messages"></div>

        <div id="chat-input-container">
            <textarea 
                id="chat-input" 
                placeholder="Type your message..."
                rows="1"
            ></textarea>
            <button id="send-btn" aria-label="Send message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script type="module" src="widget.js?v=2"></script>
</body>
</html>
