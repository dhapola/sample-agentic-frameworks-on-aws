<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Debug</title>
    <link rel="stylesheet" href="widget.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
        }
        .debug-info {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        .debug-info h3 {
            margin-top: 0;
        }
        #widget-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="debug-info">
        <h3>Debug Information</h3>
        <div id="debug-output"></div>
    </div>

    <div id="widget-container">
        <div id="chat-widget">
            <div id="chat-header">
                <div class="header-content">
                    <h3 id="chat-title">Debug Mode</h3>
                    <p id="chat-subtitle">Testing markdown rendering</p>
                </div>
            </div>

            <div id="chat-messages"></div>

            <div id="chat-input-container">
                <button id="test-btn" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    Test Markdown Rendering
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        const testMarkdown = `Based on the SageMaker documentation, there are several ways to deploy a model in SageMaker. Here are the main approaches:

## 1. Deploy a Pre-trained Model Using the SageMaker Model Class

This approach is useful when you have a pre-trained model ready to deploy:

\`\`\`python
from sagemaker import image_uris, model_uris, script_uris

# Select your model
model_id, model_version = "tensorflow-tc-bert-en-cased-L-12-H-768-A-12-2", "1.0.0"
instance_type, instance_count = "ml.m5.xlarge", 1
\`\`\`

After obtaining these components, you can create a SageMaker Model and deploy it to an endpoint using the standard \`deploy()\` method.

## 2. Deploy Using ModelBuilder Class (Recommended for Simplicity)

The **ModelBuilder** simplifies the deployment process by handling multiple setup steps automatically, including:

- Choosing the model image
- Setting up endpoint configuration
- Coding serialization/deserialization functions
- Managing model dependencies

For more detailed information, you can refer to the [SageMaker models documentation](https://sagemaker.readthedocs.io/en/stable/api/inference/model.html).`;

        function formatMarkdown(text) {
            console.log('=== formatMarkdown START ===');
            console.log('Input length:', text.length);
            
            let html = text;
            
            // Escape HTML
            const escapeHtml = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Process code blocks first
            const codeBlocks = [];
            html = html.replace(/```[\w]*\n([\s\S]*?)```/g, (match, code) => {
                const placeholder = `___CODE_BLOCK_${codeBlocks.length}___`;
                codeBlocks.push('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
                console.log('Found code block:', codeBlocks.length);
                return placeholder;
            });
            
            // Process inline code
            const inlineCodes = [];
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                const placeholder = `___INLINE_CODE_${inlineCodes.length}___`;
                inlineCodes.push('<code>' + escapeHtml(code) + '</code>');
                return placeholder;
            });
            
            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            console.log('After headers:', html.substring(0, 200));
            
            // Bold
            html = html.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            
            // Lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>');
            
            // Paragraphs
            html = html.split('\n\n').map(para => {
                para = para.trim();
                if (!para) return '';
                if (para.match(/^<(h[1-6]|pre|ul|ol|blockquote|div)/)) {
                    return para;
                }
                para = para.replace(/\n/g, '<br>');
                return '<p>' + para + '</p>';
            }).join('\n');
            
            // Restore code blocks
            codeBlocks.forEach((code, i) => {
                html = html.replace(`___CODE_BLOCK_${i}___`, code);
            });
            
            // Restore inline codes
            inlineCodes.forEach((code, i) => {
                html = html.replace(`___INLINE_CODE_${i}___`, code);
            });
            
            console.log('Output length:', html.length);
            console.log('First 500 chars:', html.substring(0, 500));
            console.log('=== formatMarkdown END ===');
            
            return html;
        }

        document.getElementById('test-btn').addEventListener('click', () => {
            const messagesContainer = document.getElementById('chat-messages');
            const debugOutput = document.getElementById('debug-output');
            
            // Clear previous
            messagesContainer.innerHTML = '';
            
            // Create message
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Format and set
            const formatted = formatMarkdown(testMarkdown);
            contentDiv.innerHTML = formatted;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Debug info
            debugOutput.innerHTML = `
                <strong>Test completed!</strong><br>
                Input length: ${testMarkdown.length} chars<br>
                Output length: ${formatted.length} chars<br>
                innerHTML set: ${contentDiv.innerHTML.length} chars<br>
                <br>
                <strong>First 500 chars of formatted HTML:</strong><br>
                <pre style="background: #f0f0f0; padding: 10px; overflow-x: auto;">${formatted.substring(0, 500).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
            `;
            
            console.log('Message added to DOM');
            console.log('contentDiv.innerHTML:', contentDiv.innerHTML.substring(0, 500));
        });
        
        // Auto-run test
        setTimeout(() => {
            document.getElementById('test-btn').click();
        }, 500);
    </script>
</body>
</html>
